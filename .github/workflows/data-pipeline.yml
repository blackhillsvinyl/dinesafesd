name: Update Inspection Data

on:
  schedule:
    # Daily incremental at 6 AM Central Time (12 PM UTC)
    - cron: '0 12 * * *'
    # Monthly full backfill on the 1st at 2 AM Central Time (8 AM UTC)
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Update mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - full
          - test
          - counties
          - backfill-scores
      counties:
        description: 'Comma-separated county names (modes: counties, backfill-scores) — empty backfill-scores runs statewide'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # GitHub-hosted runners cap at 6h; leave headroom for commit + deploy
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      # A queued dispatch pins the sha from dispatch time; if another run
      # committed data while this one waited, that checkout is stale.
      - name: Sync to branch tip
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 1 * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run data pipeline
        id: pipeline
        # Step timeout below the job's so commit/deploy always get to run;
        # the pipeline saves after every county, so a timeout keeps progress.
        timeout-minutes: 340
        env:
          # Free-text input must reach the shell via env, not ${{ }} expansion,
          # so a crafted value can't inject commands into this script.
          COUNTIES: ${{ github.event.inputs.counties }}
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            full)
              # Full statewide backfill + full SWEEPS detail refresh. Runs both
              # sources independently and always persists partial progress.
              npm run sync:daily -- --full
              ;;
            counties)
              npm run sync:counties -- "$COUNTIES"
              ;;
            backfill-scores)
              # Downloads/parses report PDFs for stored inspections missing a
              # score (Past Inspections rows carry no score in the grid).
              npm run backfill:scores -- "$COUNTIES"
              ;;
            test)
              npm run sync:test
              ;;
            *)
              npm run sync:daily
              ;;
          esac
        working-directory: services/data-pipeline

      # Runs even if the pipeline step failed, so partial progress is never lost
      # (daily-sync always persists what it fetched before exiting).
      - name: Commit and push updated data
        id: commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data
          if git diff --cached --quiet; then
            echo "No data changes to publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: scheduled update (${{ steps.mode.outputs.mode }})"
            if ! git pull --rebase origin "${{ github.ref_name }}"; then
              # Another run pushed data derived from the same base — git can't
              # merge the JSON, so merge at the data level: re-apply the remote
              # snapshot additively into ours (store semantics keep both sides'
              # scores/inspections), then re-commit on the remote tip.
              git rebase --abort || true
              git worktree add /tmp/theirs "origin/${{ github.ref_name }}"
              (cd services/data-pipeline && npm run merge:data -- /tmp/theirs/apps/web/public/data)
              git reset --soft "origin/${{ github.ref_name }}"
              git add apps/web/public/data
              git commit -m "data: scheduled update (${{ steps.mode.outputs.mode }}, merged)"
            fi
            git push origin "HEAD:${{ github.ref_name }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Bot pushes don't trigger other workflows, so deploy directly when data
      # changed — including partial progress from a failed run (additive).
      - name: Build web app
        if: always() && steps.commit.outputs.changed == 'true'
        run: npm run build --workspace=web

      - name: Deploy to Cloudflare Pages
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy apps/web/dist --project-name=dinesafesd --branch=main

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: services/data-pipeline/logs/
          if-no-files-found: ignore

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled data update failed ($(date -u +%Y-%m-%d), mode: ${{ steps.mode.outputs.mode }})" \
            --body "The scheduled data update failed. See the run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
